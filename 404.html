<!DOCTYPE html>
<html lang="es-ES">

<head>

    <meta name="robots" content="noindex, follow">

    <style>
        :root {
            --bg-dark: #0a1628;
            --surface: #102138;
            --accent: #FF6B35;
            --text: rgba(255, 255, 255, 0.95);
            --text-muted: rgba(255, 255, 255, 0.7);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        .error-card {
            background: var(--surface);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            max-width: 500px;
            width: 90%;
            border-top: 3px solid var(--accent);
        }

        .error-code {
            font-size: 5rem;
            font-weight: 800;
            color: var(--accent);
            margin: 0;
            line-height: 1;
        }

        .error-title {
            font-size: 1.5rem;
            margin: 15px 0 10px;
            font-weight: 700;
        }

        .error-desc {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: var(--accent);
            color: #fff;
            text-decoration: none;
            font-weight: 700;
            padding: 14px 28px;
            border-radius: 50px;
            font-size: 0.95rem;
            transition: transform 0.2s, box-shadow 0.2s;
            border: none;
            cursor: pointer;
            width: 100%;
            box-sizing: border-box;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 107, 53, 0.4);
        }

        .btn-ghost {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin-top: 15px;
            color: var(--text);
        }

        .btn-ghost:hover {
            background: rgba(255, 255, 255, 0.05);
            box-shadow: none;
        }
    </style>
</head>

<body>
